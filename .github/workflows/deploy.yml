name: Deploy WordPress Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy theme via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp

          # Carpeta del tema en el servidor
          server-dir: public_html/wp-content/themes/wordpress-theme/

          # Carpeta del tema dentro del repositorio
          local-dir: ./wordpress-theme/

          # Mantiene sincronizado el servidor eliminando archivos borrados en Git
          dangerous-clean-slate: false

          exclude: |
            **/.git*
            **/.github/**
            **/README.md
            **/.DS_Store
            **/node_modules/**
            **/.vscode/**